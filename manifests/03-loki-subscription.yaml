---
# Suscripcion al Loki Operator — version comunitaria desde OperatorHub
#
# Verificar el canal disponible en tu version de OCP:
#   oc get packagemanifest loki-operator -n openshift-marketplace \
#     -o jsonpath='{.status.channels[*].name}'
#
# Nota: "community-operators" no requiere suscripcion Red Hat.
# Es el catalogo de operators mantenidos por la comunidad, disponible en todo OCP.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators
spec:
  channel: stable-6.x
  installPlanApproval: Automatic
  name: loki-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
