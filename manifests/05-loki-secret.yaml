---
# Secret con las credenciales de acceso al object storage (MinIO / S3)
# El LokiStack operator lee este secret para configurar el backend de almacenamiento
apiVersion: v1
kind: Secret
metadata:
  name: lokistack-s3-credentials
  namespace: netobserv
stringData:
  access_key_id: minioadmin
  access_key_secret: minioadmin
  bucketnames: loki-chunks
  endpoint: http://minio.netobserv.svc:9000
  region: us-east-1
