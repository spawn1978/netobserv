---
# Namespace de prueba para validar el funcionamiento de Network Observability
apiVersion: v1
kind: Namespace
metadata:
  name: demo-netobserv
  labels:
    app.kubernetes.io/part-of: netobserv-demo
    environment: lab
---
# NetworkPolicy permisiva para el namespace de prueba
# Permite trafico entre todos los pods del namespace y desde internet
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-demo
  namespace: demo-netobserv
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
