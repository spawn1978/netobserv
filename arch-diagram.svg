  <text x="110" y="157" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">Pod A</text>
  <text x="110" y="171" text-anchor="middle" fill="#586069" font-size="9">app: frontend</text>
  <text x="110" y="182" text-anchor="middle" fill="#586069" font-size="9">ns: demo-apps</text>

  <rect x="175" y="138" width="100" height="50" rx="6" fill="#0d3349" stroke="#1f6feb" stroke-width="1"/>
  <text x="225" y="157" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">Pod B</text>
  <text x="225" y="171" text-anchor="middle" fill="#586069" font-size="9">app: backend</text>
  <text x="225" y="182" text-anchor="middle" fill="#586069" font-size="9">ns: demo-apps</text>

  <!-- Traffic arrow between pods node 1 -->
  <line x1="160" y1="163" x2="175" y2="163" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="173,159 180,163 173,167" fill="#f0a500"/>

