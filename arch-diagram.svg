  <text x="370" y="171" text-anchor="middle" fill="#586069" font-size="9">app: database</text>
  <text x="370" y="182" text-anchor="middle" fill="#586069" font-size="9">ns: demo-apps</text>

  <rect x="435" y="138" width="100" height="50" rx="6" fill="#0d3349" stroke="#1f6feb" stroke-width="1"/>
  <text x="485" y="157" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">Pod D</text>
  <text x="485" y="171" text-anchor="middle" fill="#586069" font-size="9">app: cache</text>
  <text x="485" y="182" text-anchor="middle" fill="#586069" font-size="9">ns: demo-apps</text>

