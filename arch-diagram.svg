  <rect x="60" y="210" width="215" height="60" rx="8" fill="#1e2d1e" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="80" cy="240" r="12" fill="#238636"/>
  <text x="80" y="244" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">e</text>
  <text x="145" y="234" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">eBPF Agent</text>
  <text x="145" y="248" text-anchor="middle" fill="#586069" font-size="9">DaemonSet Pod</text>
  <text x="145" y="260" text-anchor="middle" fill="#586069" font-size="9">Captura flows de red</text>

  <!-- Capture arrow from pods to ebpf node1 -->
  <line x1="110" y1="188" x2="110" y2="210" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polygon points="106,208 110,215 114,208" fill="#3fb950"/>
  <line x1="225" y1="188" x2="225" y2="210" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polygon points="221,208 225,215 229,208" fill="#3fb950"/>

