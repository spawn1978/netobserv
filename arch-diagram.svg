  <rect x="20" y="68" width="180" height="22" rx="4" fill="#cc0000"/>
  <text x="110" y="83" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">OpenShift Cluster</text>

  <!-- ===== WORKER NODE 1 ===== -->
