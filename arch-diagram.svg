  <rect x="320" y="210" width="215" height="60" rx="8" fill="#1e2d1e" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="340" cy="240" r="12" fill="#238636"/>
  <text x="340" y="244" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">e</text>
  <text x="405" y="234" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">eBPF Agent</text>
  <text x="405" y="248" text-anchor="middle" fill="#586069" font-size="9">DaemonSet Pod</text>
  <text x="405" y="260" text-anchor="middle" fill="#586069" font-size="9">Captura flows de red</text>

