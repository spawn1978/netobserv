  <rect x="45" y="118" width="240" height="10" rx="0" fill="#232b42"/>
  <text x="165" y="119" text-anchor="middle" fill="#8b9dc3" font-size="11" font-weight="bold">Worker Node 1</text>

  <!-- Pods Node 1 -->
