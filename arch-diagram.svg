  <text x="335" y="338" fill="#586069" font-size="9">- Namespace / Deployment</text>
  <text x="335" y="352" fill="#586069" font-size="9">- Labels de Kubernetes</text>
  <text x="335" y="366" fill="#586069" font-size="9">- Direccion del flujo</text>

