  <text x="681" y="252" text-anchor="middle" fill="#586069" font-size="9">kind: FlowCollector</text>
  <text x="681" y="264" text-anchor="middle" fill="#586069" font-size="9">name: cluster</text>
  <text x="681" y="276" text-anchor="middle" fill="#586069" font-size="9">agent.type: eBPF</text>

