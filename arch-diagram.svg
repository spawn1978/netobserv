<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="720" fill="#0f1117"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">Network Observability Operator — Arquitectura OpenShift</text>
  <text x="550" y="58" text-anchor="middle" fill="#8b9dc3" font-size="12">Basado en Red Hat Network Observability Operator (eBPF)</text>

  <!-- ===== OPENSHIFT CLUSTER BOUNDARY ===== -->
