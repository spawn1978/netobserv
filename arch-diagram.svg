  <text x="167" y="307" text-anchor="middle" fill="#8b9dc3" font-size="10" font-weight="bold">Metricas capturadas</text>
  <text x="75" y="324" fill="#586069" font-size="9">- src/dst IP, Puerto, Protocolo</text>
  <text x="75" y="338" fill="#586069" font-size="9">- Bytes / Paquetes transferidos</text>
  <text x="75" y="352" fill="#586069" font-size="9">- Latencia de red</text>
  <text x="75" y="366" fill="#586069" font-size="9">- Namespace / Pod / Workload</text>

